<!DOCTYPE HTML PUBLIC "-/AA/3C//DTD HTML 4.01//EN" http://www.w3.org/ 
TR/HTM L4.01 /strict. dtd > 
<head>
    <title>Calculadora web</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" type="text/css" href="estilos_css.css" media=screen> <!-- importación de la hoja de estilos CSS-->
    <script src="funcionalidad_calculadora.js" type="text/javascript" defer></script> <!--Importacion de codigo javasript, con defer para que se ejecute dicho codigo despues de cargarse completamente el DOM-->
</head>
<body>
 <header id="centro"><span><b>Calculadora web</b></span></header> <!-- Encabezado del titulo -->
 <div id="calculadora">
    <div id="caja">
        <div class="operacion"><textarea id="campo" readonly></textarea></div>  <!-- uso de readonly para garantizar de que el contenido del elemento textarea no pueda ser editado por el usuario distinto a la edicion por eventos de los botones-->
            <table border="2px" class="operacion">  <!-- A COTNINUACION, LOS BOTONES Y SUS VALORES-->
            <tr>
                <td><button value="1">1</button></td>
                <td><button value="2">2</button></td>
                <td><button value="3">3</button></td>
                <td><button value="+">+</button></td>
            </tr>
            <tr>
                <td><button value="4">4</button></td>
                <td><button value="5">5</button></td>
                <td><button value="6">6</button></td>
                <td><button value="-">-</button></td>
            </tr>
            <tr>
                <td><button value="7">7</button></td>
                <td><button value="8">8</button></td>
                <td><button value="9">9</button></td>
                <td><button value="x">x</button></td>
            </tr>
            <tr>
                <td><button value="B">B</button></td>
                <td><button value="0">0</button></td>
                <td><button value=",">,</button></td>
                <td><button value="/">/</button></td>
            </tr>
            <tr>
                <td><button value="(">(</button></td>
                <td><button value=")">)</button></td>
                <td colspan="2"><button value="=">=</button></td>
            </tr>
            </table>
    </div>
</div>
</body>

</html>
